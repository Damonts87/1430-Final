<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>Expense Tracker</h1>
      <button id="theme-toggle" class="btn">Toggle Theme</button>
    </header>

    <h2 id="name">Welcome</h2>
    <h2 id="total">Total: $0.00</h2>

    <div class="layout">

      <!-- LEFT -->
      <div class="form-section">
        <form id="item-form">
          <input type="text" id="item-input" placeholder="Item Name" />
          <input type="number" id="price-input" step="0.01" placeholder="Price" />
          <input type="date" id="date-input" />
          <button type="submit" class="btn">Add Expense</button>
        </form>
      </div>

      <!-- RIGHT -->
      <div class="list-section">

        <!-- Search + Sort -->
        <div class="list-controls">
          <input type="text" id="filter" placeholder="Search..." />

          <select id="sort">
            <option value="">Sort By</option>
            <option value="az">Name (A-Z)</option>
            <option value="za">Name (Z-A)</option>
            <option value="high">Price (High → Low)</option>
            <option value="low">Price (Low → High)</option>
            <option value="new">Date (Newest → Oldest)</option>
            <option value="old">Date (Oldest → Newest)</option>
          </select>
        </div>

        <button id="clear" class="btn-clear">Clear All</button>
        <ul id="item-list"></ul>
      </div>

    </div>
    <button id="report-btn" class="btn">Show Report</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
